[build]
  command = "npm run build && npm run export"
  publish = "out"

  [build.environment]
    NODE_VERSION = "20.10.0"
    NEXT_TELEMETRY_DISABLED = "1"
    NPM_FLAGS = "--silent"

# Redirections pour Next.js (ISR/SSR gérés par le plugin)
[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200
  force = true


